<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网速测试 - 静态测试页面</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      color: #333;
    }
    .container {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      max-width: 600px;
      width: 90%;
      text-align: center;
    }
    h1 {
      color: #2563eb;
      margin-bottom: 1rem;
    }
    p {
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .button {
      display: inline-block;
      background-color: #2563eb;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    .button:hover {
      background-color: #1d4ed8;
    }
    .status {
      margin-top: 2rem;
      padding: 1rem;
      background-color: #f0f9ff;
      border-radius: 4px;
      border-left: 4px solid #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>网速测试 - 静态页面测试</h1>
    <p>如果您能看到这个页面，说明服务器能够正确提供静态HTML内容。</p>
    <p>这个页面用于验证Cloudflare Worker能否正确提供基本网页内容。</p>
    
    <a href="/" class="button">返回主页</a>
    
    <div class="status">
      <p><strong>服务器状态：</strong> 正常运行</p>
      <p><strong>页面类型：</strong> 静态HTML</p>
      <p><strong>加载时间：</strong> <span id="load-time">计算中...</span></p>
    </div>
  </div>

  <script>
    // 计算页面加载时间
    window.addEventListener('load', function() {
      const loadTime = performance.now();
      document.getElementById('load-time').textContent = loadTime.toFixed(2) + 'ms';
    });
  </script>
</body>
</html>
